<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#FFFFFF">
    <title>EchoWithin</title>
    <style>
        :root {
            --primary: #3e2217;
            --bg: #FFFFFF;
            --text: #1e293b;
            --text-muted: #64748b;
        }

        body {
            height: 100vh;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text);
            text-align: center;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 300px;
            transition: opacity 0.3s ease;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #f1f5f9;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 24px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        h2 {
            margin: 0 0 8px 0;
            font-size: 1.5rem;
            font-weight: 600;
        }

        p {
            margin: 0;
            font-size: 1rem;
            color: var(--text-muted);
        }

        .error-state {
            display: none;
        }

        button {
            margin-top: 24px;
            padding: 12px 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        button:active {
            transform: translateY(1px);
        }
    </style>
</head>

<body>
    <div class="container" id="loader-container">
        <div class="spinner"></div>
        <h2>EchoWithin</h2>
        <p id="status-text">Connecting to server...</p>
    </div>

    <script src="capacitor.js"></script>
    <script>
        const LIVE_SITE = 'https://blog.echowithin.xyz';
        let redirectStarted = false;

        function parseDeepLink(deepLinkUrl) {
            if (!deepLinkUrl) return null;
            try {
                const url = new URL(deepLinkUrl);
                if (url.protocol === 'echowithin:' && url.host === 'open') {
                    let path = url.searchParams.get('path') || '/';
                    const params = new URLSearchParams(url.search);
                    params.delete('path');
                    const search = params.toString();
                    if (search) path += '?' + search;
                    return LIVE_SITE + path;
                }
            } catch (e) {
                console.error('Error parsing deep link:', e);
            }
            return null;
        }

        async function run() {
            console.log("Bridge: Starting...");

            await new Promise(r => setTimeout(r, 100));

            const { SplashScreen, App, Browser } = (window.Capacitor && window.Capacitor.Plugins) || {};

            if (SplashScreen) {
                try {
                    await SplashScreen.hide();
                } catch (e) { console.error(e); }
            }

            // Set up deep link listeners
            if (App) {
                App.addListener('appUrlOpen', function (event) {
                    const targetUrl = parseDeepLink(event.url);
                    if (targetUrl) {
                        if (Browser) Browser.close().catch(() => { });
                        window.location.replace(targetUrl);
                    }
                });
            }

            // Detect cold-start deep link
            let path = '';
            if (App) {
                try {
                    const launch = await App.getLaunchUrl();
                    if (launch && launch.url) {
                        const targetUrl = parseDeepLink(launch.url);
                        if (targetUrl) {
                            const url = new URL(targetUrl);
                            path = url.pathname + url.search;
                        }
                    }
                } catch (e) { console.error(e); }
            }

            const targetUrl = path ? LIVE_SITE + path : LIVE_SITE;

            // Connectivity check with retry — the WebView network stack
            // may not be ready on cold start, so retry a few times
            async function canReachServer() {
                try {
                    const resp = await fetch(LIVE_SITE + '/static/manifest.json', {
                        method: 'HEAD',
                        cache: 'no-store',
                        signal: AbortSignal.timeout(5000)
                    });
                    return resp.ok;
                } catch (e) {
                    return false;
                }
            }

            // Retry connectivity up to 3 times with short delays
            let reachable = false;
            for (let attempt = 1; attempt <= 3; attempt++) {
                reachable = await canReachServer();
                if (reachable) break;
                // Wait before next attempt (network stack may still be initializing)
                await new Promise(r => setTimeout(r, 1000));
                document.getElementById('status-text').textContent =
                    attempt < 3 ? 'Still connecting...' : 'Checking connection...';
            }

            if (reachable) {
                // Server reachable — redirect immediately
                redirectStarted = true;
                window.location.replace(targetUrl);
                return;
            }

            // All retries failed — redirect anyway and let the service worker
            // serve cached content. The SW has offline fallback pages cached.
            // Only show offline UI if navigator says we're truly offline.
            if (navigator.onLine) {
                // Likely a transient issue — redirect and let SW handle it
                document.getElementById('status-text').textContent = 'Loading...';
                redirectStarted = true;
                window.location.replace(targetUrl);
                return;
            }

            // Truly offline — still redirect so SW can serve cached pages
            document.getElementById('status-text').textContent = 'Loading offline content...';
            redirectStarted = true;
            window.location.replace(targetUrl);
        }

        run();
    </script>
</body>

</html>
