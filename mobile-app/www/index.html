<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#FFFFFF">
    <title>EchoWithin</title>
    <style>
        :root {
            --primary: #3e2217;
            --bg: #FFFFFF;
            --text: #1e293b;
            --text-muted: #64748b;
        }

        body {
            height: 100vh;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text);
            text-align: center;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 300px;
            transition: opacity 0.3s ease;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #f1f5f9;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 24px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        h2 {
            margin: 0 0 8px 0;
            font-size: 1.5rem;
            font-weight: 600;
        }

        p {
            margin: 0;
            font-size: 1rem;
            color: var(--text-muted);
        }

        .error-state {
            display: none;
        }

        button {
            margin-top: 24px;
            padding: 12px 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        button:active {
            transform: translateY(1px);
        }

        .secondary-btn {
            margin-top: 10px;
            background: #f8fafc;
            color: #334155;
            border: 1px solid #dbe4ee;
            box-shadow: none;
        }

        .secondary-btn:hover {
            background: #f1f5f9;
        }

        .offline-hint {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #94a3b8;
            max-width: 280px;
        }
    </style>
</head>

<body>
    <div class="container" id="loader-container">
        <div class="spinner"></div>
        <h2>EchoWithin</h2>
        <p id="status-text">Connecting to server...</p>
    </div>

    <div class="container error-state" id="offline-container">
        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
            style="color: var(--text-muted); margin-bottom: 16px;">
            <line x1="1" y1="1" x2="23" y2="23"></line>
            <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
            <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
            <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
            <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
            <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
            <line x1="12" y1="20" x2="12.01" y2="20"></line>
        </svg>
        <h2>You're Offline</h2>
        <p>Please check your internet connection and try again.</p>
        <button id="retry-btn">Retry</button>
        <button id="open-cached-btn" class="secondary-btn" type="button" style="display: none;">Open Cached Content</button>
        <p id="offline-hint" class="offline-hint" style="display: none;">If you opened pages before, this can load them from cache while offline.</p>
    </div>

    <script src="capacitor.js"></script>
    <script>
        const LIVE_SITE = 'https://blog.echowithin.xyz';
        const LIVE_HOST = 'blog.echowithin.xyz';
        const LAST_ONLINE_URL_KEY = 'ew_last_online_url';
        let redirectStarted = false;
        let lastTargetUrl = LIVE_SITE;

        function normalizePathToLiveSite(pathOrUrl) {
            if (!pathOrUrl) return null;
            const raw = String(pathOrUrl).trim();
            if (!raw) return null;

            try {
                const parsed = new URL(raw);
                if ((parsed.protocol === 'http:' || parsed.protocol === 'https:') && parsed.hostname === LIVE_HOST) {
                    return `${parsed.origin}${parsed.pathname}${parsed.search}${parsed.hash}`;
                }
                return null;
            } catch (_) {
                const normalizedPath = raw.startsWith('/') ? raw : `/${raw}`;
                return LIVE_SITE + normalizedPath;
            }
        }

        async function hasInternetConnection() {
            const { Network } = (window.Capacitor && window.Capacitor.Plugins) || {};
            if (Network && typeof Network.getStatus === 'function') {
                try {
                    const status = await Network.getStatus();
                    if (typeof status.connected === 'boolean') {
                        return status.connected;
                    }
                } catch (e) {
                    console.warn('Bridge: Network status check failed, falling back to navigator.onLine', e);
                }
            }
            return navigator.onLine;
        }

        async function canReachLiveSite() {
            const probeUrl = LIVE_SITE + '/offline?bridge_probe=1&ts=' + Date.now();
            const controller = new AbortController();
            const timeoutId = setTimeout(function () { controller.abort(); }, 6000);

            try {
                await fetch(probeUrl, {
                    method: 'GET',
                    mode: 'no-cors',
                    cache: 'no-store',
                    signal: controller.signal
                });
                return true;
            } catch (err) {
                console.error('Bridge: Reachability probe failed:', err);
                return false;
            } finally {
                clearTimeout(timeoutId);
            }
        }

        function parseDeepLink(deepLinkUrl) {
            if (!deepLinkUrl) return null;
            try {
                const url = new URL(deepLinkUrl);
                if (url.protocol === 'echowithin:' && url.host === 'open') {
                    let path = url.searchParams.get('path') || '/';
                    const params = new URLSearchParams(url.search);
                    params.delete('path');
                    const search = params.toString();
                    if (search) path += '?' + search;
                    return normalizePathToLiveSite(path);
                }

                if ((url.protocol === 'http:' || url.protocol === 'https:') && url.hostname === LIVE_HOST) {
                    return `${url.origin}${url.pathname}${url.search}${url.hash}`;
                }
            } catch (e) {
                return normalizePathToLiveSite(deepLinkUrl);
            }
            return null;
        }

        // Request push notification permissions before redirecting
        async function setupPushNotifications() {
            const { PushNotifications } = (window.Capacitor && window.Capacitor.Plugins) || {};

            if (!PushNotifications) {
                console.log('PushNotifications plugin not available');
                return;
            }

            try {
                // Check current permission status
                const permStatus = await PushNotifications.checkPermissions();
                console.log('Push permission status:', permStatus.receive);

                if (permStatus.receive === 'prompt' || permStatus.receive === 'prompt-with-rationale') {
                    // Request permission - this will show the system dialog
                    document.getElementById('status-text').textContent = 'Setting up notifications...';
                    const result = await PushNotifications.requestPermissions();
                    console.log('Permission request result:', result.receive);

                    if (result.receive === 'granted') {
                        // Register for push notifications
                        await PushNotifications.register();
                        console.log('Registered for push notifications');
                    }
                } else if (permStatus.receive === 'granted') {
                    // Already granted, just register
                    await PushNotifications.register();
                    console.log('Already have permission, registered for push');
                }

                // Listen for registration success to get the token
                PushNotifications.addListener('registration', function (token) {
                    console.log('FCM Token:', token.value);
                    // Store the token - it will be sent to the server when user logs in
                    try {
                        localStorage.setItem('fcm_token', token.value);
                    } catch (e) {
                        console.error('Failed to store FCM token:', e);
                    }
                });

                PushNotifications.addListener('registrationError', function (error) {
                    console.error('Push registration error:', error);
                });

            } catch (e) {
                console.error('Push notification setup error:', e);
            }
        }

        async function run() {
            console.log("Bridge: Starting...");

            await new Promise(r => setTimeout(r, 100));

            const { SplashScreen, App, Browser, PushNotifications } = (window.Capacitor && window.Capacitor.Plugins) || {};

            if (SplashScreen) {
                try {
                    await SplashScreen.hide();
                } catch (e) { console.error(e); }
            }

            // Request push notification permissions early
            // This must happen on the bridge page where Capacitor plugins are available
            await setupPushNotifications();

            // Check for pending notification tap that launched the app (cold start).
            // Must be done here because the event is consumed on first listener registration
            // and won't survive the page redirect to the live site.
            let notificationUrl = null;
            if (PushNotifications) {
                try {
                    notificationUrl = await Promise.race([
                        new Promise(function (resolve) {
                            PushNotifications.addListener('pushNotificationActionPerformed', function (notification) {
                                console.log('Bridge: Notification tap detected:', notification);
                                var data = notification.notification.data;
                                if (data) {
                                    var targetCandidate = data.url || data.path || data.deepLink || data.deeplink;
                                    var resolved = parseDeepLink(targetCandidate);
                                    resolve(resolved || null);
                                } else {
                                    resolve(null);
                                }
                            });
                        }),
                        // Give native bridge time to deliver pending cold-start action event
                        new Promise(function (resolve) { setTimeout(function () { resolve(null); }, 1500); })
                    ]);
                    if (notificationUrl) {
                        console.log('Bridge: Will redirect to notification URL:', notificationUrl);
                    }
                } catch (e) {
                    console.error('Bridge: Error checking notification action:', e);
                }
            }

            // Set up deep link listeners
            if (App) {
                App.addListener('appUrlOpen', function (event) {
                    const targetUrl = parseDeepLink(event.url);
                    if (targetUrl) {
                        if (Browser) Browser.close().catch(() => { });
                        window.location.replace(targetUrl);
                    }
                });
            }

            // Detect cold-start deep link
            let path = '';
            if (App) {
                try {
                    const launch = await App.getLaunchUrl();
                    if (launch && launch.url) {
                        const targetUrl = parseDeepLink(launch.url);
                        if (targetUrl) {
                            const url = new URL(targetUrl);
                            path = url.pathname + url.search;
                        }
                    }
                } catch (e) { console.error(e); }
            }

            // Build redirect target: notification tap URL > deep link > default
            let targetUrl;
            if (notificationUrl) {
                // App was launched by tapping a notification — go directly to that content
                targetUrl = notificationUrl;
            } else if (path) {
                targetUrl = LIVE_SITE + path;
            } else {
                targetUrl = LIVE_SITE;
            }
            lastTargetUrl = targetUrl;

            // When offline, show the local offline UI — the Service Worker for blog.echowithin.xyz
            // can't intercept cross-origin navigations from the bridge page (different origin).
            // The online listener will auto-retry when connectivity returns.
            const isConnected = await hasInternetConnection();
            if (!isConnected) {
                showOfflineUI();
                return;
            }

            console.log('Bridge: Network appears online, verifying connection to:', targetUrl);
            document.getElementById('status-text').textContent = 'Loading...';

            try {
                const reachable = await canReachLiveSite();
                if (!reachable) {
                    showOfflineUI();
                    return;
                }

                // Fetch succeeded — server is reachable
                console.log('Bridge: Connection verified. Redirecting...');
                try {
                    localStorage.setItem(LAST_ONLINE_URL_KEY, targetUrl);
                } catch (e) {
                    console.warn('Bridge: Failed to store last online URL', e);
                }
                redirectStarted = true;
                window.location.replace(targetUrl);

            } catch (err) {
                // Fetch failed (network error, timeout)
                console.error('Bridge: Connection verification failed:', err);
                showOfflineUI();
            }
        }

        function showOfflineUI() {
            document.getElementById('loader-container').style.display = 'none';
            const offlineContainer = document.getElementById('offline-container');
            offlineContainer.style.display = 'flex';

            const cachedBtn = document.getElementById('open-cached-btn');
            const offlineHint = document.getElementById('offline-hint');
            const lastOnlineUrl = localStorage.getItem(LAST_ONLINE_URL_KEY);
            if (cachedBtn && offlineHint) {
                if (lastOnlineUrl) {
                    cachedBtn.style.display = 'inline-block';
                    offlineHint.style.display = 'block';
                } else {
                    cachedBtn.style.display = 'none';
                    offlineHint.style.display = 'none';
                }
            }
        }

        function hideOfflineUI() {
            document.getElementById('offline-container').style.display = 'none';
            document.getElementById('loader-container').style.display = 'flex';
            document.getElementById('status-text').textContent = 'Connecting to server...';
        }

        // Retry button handler
        document.getElementById('retry-btn').addEventListener('click', function () {
            hideOfflineUI();
            run();
        });

        document.getElementById('open-cached-btn').addEventListener('click', function () {
            // Open the app's offline route, which can list and link available cached pages.
            window.location.replace(`${LIVE_SITE}/offline?from_native=1`);
        });

        // Auto-retry when connection is restored
        window.addEventListener('online', function () {
            if (!redirectStarted) {
                hideOfflineUI();
                run();
            }
        });

        run();
    </script>
</body>

</html>
