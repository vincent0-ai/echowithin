<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to EchoWithin App...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #8B0000 0%, #5C0000 100%);
            color: white;
            text-align: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        p {
            opacity: 0.9;
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            background: white;
            color: #8B0000;
            padding: 12px 30px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 15px;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: scale(1.05);
        }
        .fallback {
            margin-top: 30px;
            font-size: 0.85rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h1>Opening EchoWithin App...</h1>
        <p>You've successfully signed in! Redirecting you to the app.</p>
        
        <div id="manual-action" style="display: none;">
            <p>If the app doesn't open automatically:</p>
            <a href="{{ deep_link_url | default(https_deep_link) | default(fallback_url) }}" class="btn" id="open-app-btn">Open EchoWithin App</a>
        </div>
        
        <div class="fallback">
            <p>Having trouble? <a href="{{ fallback_url }}" style="color: white;">Continue in browser</a></p>
        </div>
    </div>

    <script>
        const customSchemeUrl = "{{ deep_link_url | default('') }}";
        const httpsDeepLink = "{{ https_deep_link | default('') }}";
        const fallbackUrl = "{{ fallback_url }}";
        
        console.log('Mobile redirect page loaded');
        console.log('Custom scheme URL:', customSchemeUrl);
        console.log('HTTPS deep link:', httpsDeepLink);
        console.log('Fallback URL:', fallbackUrl);
        
        // Build Android Intent URL from custom scheme - Chrome's official way to open apps
        // Format: intent://host?query#Intent;scheme=X;package=Y;S.browser_fallback_url=Z;end
        function buildIntentUrl(schemeUrl) {
            if (!schemeUrl || !schemeUrl.startsWith('echowithin://')) return null;
            var path = schemeUrl.substring('echowithin://'.length);
            return 'intent://' + path + '#Intent;scheme=echowithin;package=xyz.echowithin.app;S.browser_fallback_url=' + encodeURIComponent(fallbackUrl) + ';end';
        }
        
        function openApp() {
            var intentUrl = buildIntentUrl(customSchemeUrl);
            
            if (intentUrl) {
                // Intent URL is the most reliable way to open apps from Chrome on Android
                console.log('Using Intent URL:', intentUrl);
                window.location.href = intentUrl;
            } else if (customSchemeUrl) {
                // Fallback for non-Chrome browsers
                console.log('Using custom scheme:', customSchemeUrl);
                window.location.href = customSchemeUrl;
            } else if (httpsDeepLink) {
                console.log('Using HTTPS deep link:', httpsDeepLink);
                window.location.href = httpsDeepLink;
            } else {
                window.location.href = fallbackUrl;
            }
            
            // Show manual button after 3 seconds if redirect didn't work
            setTimeout(function() {
                document.getElementById('manual-action').style.display = 'block';
                // Update manual button to use intent URL too
                var btn = document.getElementById('open-app-btn');
                if (btn && intentUrl) btn.href = intentUrl;
            }, 3000);
        }
        
        // Start redirect immediately
        openApp();
        
        // If user comes back to this page, show manual button
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                document.getElementById('manual-action').style.display = 'block';
            }
        });
    </script>
</body>
</html>
