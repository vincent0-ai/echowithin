<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#FFFFFF">
    <title>EchoWithin</title>
    <style>
        :root {
            --primary: #3e2217;
            --bg: #FFFFFF;
            --text: #1e293b;
            --text-muted: #64748b;
        }

        body {
            height: 100vh;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text);
            text-align: center;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 300px;
            transition: opacity 0.3s ease;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #f1f5f9;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 24px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        h2 {
            margin: 0 0 8px 0;
            font-size: 1.5rem;
            font-weight: 600;
        }

        p {
            margin: 0;
            font-size: 1rem;
            color: var(--text-muted);
        }

        .error-state {
            display: none;
        }

        button {
            margin-top: 24px;
            padding: 12px 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        button:active {
            transform: translateY(1px);
        }
    </style>
</head>

<body>
    <div class="container" id="loader-container">
        <div class="spinner"></div>
        <h2>EchoWithin</h2>
        <p id="status-text">Connecting to server...</p>

        <div id="retry-container" class="error-state">
            <p>Connection is taking longer than usual.</p>
            <button onclick="window.location.reload()">Try Again</button>
        </div>
    </div>

    <script src="capacitor.js"></script>
    <script>
        const LIVE_SITE = 'https://blog.echowithin.xyz';
        let redirectStarted = false;

        function parseDeepLink(deepLinkUrl) {
            if (!deepLinkUrl) return null;
            try {
                const url = new URL(deepLinkUrl);
                if (url.protocol === 'echowithin:' && url.host === 'open') {
                    let path = url.searchParams.get('path') || '/';
                    const params = new URLSearchParams(url.search);
                    params.delete('path');
                    const search = params.toString();
                    if (search) path += '?' + search;
                    return LIVE_SITE + path;
                }
            } catch (e) {
                console.error('Error parsing deep link:', e);
            }
            return null;
        }

        async function run() {
            console.log("Bridge: Starting...");

            // 1. Give the DOM a tiny moment to render the message
            await new Promise(r => setTimeout(r, 100));

            const { SplashScreen, App, Browser } = (window.Capacitor && window.Capacitor.Plugins) || {};

            // 2. Hide splash screen AFTER we are sure the bridge UI is visible
            if (SplashScreen) {
                try {
                    console.log("Bridge: Hiding Splash...");
                    await SplashScreen.hide();
                } catch (e) { console.error(e); }
            }

            // 3. Set up deep link listeners
            if (App) {
                App.addListener('appUrlOpen', function (event) {
                    console.log("Bridge: appUrlOpen received:", event.url);
                    const targetUrl = parseDeepLink(event.url);
                    if (targetUrl) {
                        if (Browser) Browser.close().catch(() => { });
                        window.location.replace(targetUrl);
                    }
                });
            }

            // 4. Detect cold-start deep link
            let path = '';
            if (App) {
                try {
                    const launch = await App.getLaunchUrl();
                    if (launch && launch.url) {
                        const targetUrl = parseDeepLink(launch.url);
                        if (targetUrl) {
                            const url = new URL(targetUrl);
                            path = url.pathname + url.search;
                        }
                    }
                } catch (e) { console.error(e); }
            }

            const targetUrl = path ? LIVE_SITE + path : LIVE_SITE;

            // 5. Check connectivity before redirecting
            // Use a real fetch to the server as navigator.onLine is unreliable
            async function canReachServer() {
                try {
                    const resp = await fetch(LIVE_SITE + '/static/manifest.json', {
                        method: 'HEAD',
                        cache: 'no-store',
                        signal: AbortSignal.timeout(5000)
                    });
                    return resp.ok;
                } catch (e) {
                    return false;
                }
            }

            // 6. Try to reach server; if offline, wait for reconnection
            function showOfflineState() {
                document.getElementById('status-text').textContent = "You're offline";
                document.getElementById('retry-container').querySelector('p').textContent =
                    'Please check your internet connection and try again.';
                document.getElementById('retry-container').style.display = 'block';
            }

            const isReachable = await canReachServer();

            if (isReachable) {
                // Server reachable — redirect after brief delay for smooth feel
                setTimeout(() => {
                    redirectStarted = true;
                    window.location.replace(targetUrl);
                }, 600);
            } else {
                // Offline — show offline state and auto-retry when back online
                showOfflineState();
                window.addEventListener('online', async () => {
                    document.getElementById('status-text').textContent = 'Reconnecting...';
                    document.getElementById('status-text').style.display = 'block';
                    document.getElementById('retry-container').style.display = 'none';
                    // Brief delay then retry
                    const recheck = await canReachServer();
                    if (recheck) {
                        redirectStarted = true;
                        window.location.replace(targetUrl);
                    } else {
                        showOfflineState();
                    }
                });
            }

            // 7. Show retry button after 8 seconds if redirect hasn't started
            setTimeout(() => {
                if (redirectStarted) return;
                document.getElementById('status-text').style.display = 'none';
                document.getElementById('retry-container').style.display = 'block';
            }, 8000);
        }

        run();

        // 8. Global safety fallback — only redirect if we're likely online
        setTimeout(() => {
            if (!redirectStarted && navigator.onLine) {
                window.location.replace(LIVE_SITE);
            }
        }, 15000);
    </script>
</body>

</html>
