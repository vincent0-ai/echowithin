<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - EchoWithin</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #fff;
            color: #1e293b;
            text-align: center;
            padding: 20px;
        }
        .container { max-width: 300px; }
        h2 { margin: 0 0 8px; font-size: 1.5rem; font-weight: 600; }
        p { margin: 0; color: #64748b; }
        button {
            margin-top: 24px;
            padding: 12px 24px;
            background: #3e2217;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
        }
        svg { color: #64748b; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="1" y1="1" x2="23" y2="23"/>
            <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
            <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
            <path d="M10.71 5.05A16 16 0 0 1 22.58 9"/>
            <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
            <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
            <line x1="12" y1="20" x2="12.01" y2="20"/>
        </svg>
        <h2>You're Offline</h2>
        <p>Please check your internet connection and try again.</p>
        <button onclick="retryConnection()">Retry</button>
    </div>
    <script>
        function retryConnection() {
            // Navigate back to the Capacitor bridge page which has proper
            // connection verification — never navigate directly to the remote URL
            window.location.href = '/';
        }

        // Auto-retry when connectivity is restored
        window.addEventListener('online', function() {
            retryConnection();
        });

        // Hide splash screen if it's still showing
        if (window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform()
            && window.Capacitor.Plugins && window.Capacitor.Plugins.SplashScreen) {
            window.Capacitor.Plugins.SplashScreen.hide();
        }
    </script>
</body>
</html>
