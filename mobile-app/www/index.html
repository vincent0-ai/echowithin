<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#FFFFFF">
    <title>EchoWithin</title>
    <style>
        :root {
            --primary: #3e2217;
            --bg: #FFFFFF;
            --text: #1e293b;
            --text-muted: #64748b;
        }

        body {
            height: 100vh;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--text);
            text-align: center;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 300px;
            transition: opacity 0.3s ease;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #f1f5f9;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 24px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        h2 {
            margin: 0 0 8px 0;
            font-size: 1.5rem;
            font-weight: 600;
        }

        p {
            margin: 0;
            font-size: 1rem;
            color: var(--text-muted);
        }

        .error-state {
            display: none;
        }

        button {
            margin-top: 24px;
            padding: 12px 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        button:active {
            transform: translateY(1px);
        }
    </style>
</head>

<body>
    <div class="container" id="loader-container">
        <div class="spinner"></div>
        <h2>EchoWithin</h2>
        <p id="status-text">Connecting to server...</p>
    </div>

    <div class="container error-state" id="offline-container">
        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color: var(--text-muted); margin-bottom: 16px;">
            <line x1="1" y1="1" x2="23" y2="23"></line>
            <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
            <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
            <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
            <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
            <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
            <line x1="12" y1="20" x2="12.01" y2="20"></line>
        </svg>
        <h2>You're Offline</h2>
        <p>Please check your internet connection and try again.</p>
        <button id="retry-btn">Retry</button>
    </div>

    <script src="capacitor.js"></script>
    <script>
        const LIVE_SITE = 'https://blog.echowithin.xyz';
        let redirectStarted = false;

        function parseDeepLink(deepLinkUrl) {
            if (!deepLinkUrl) return null;
            try {
                const url = new URL(deepLinkUrl);
                if (url.protocol === 'echowithin:' && url.host === 'open') {
                    let path = url.searchParams.get('path') || '/';
                    const params = new URLSearchParams(url.search);
                    params.delete('path');
                    const search = params.toString();
                    if (search) path += '?' + search;
                    return LIVE_SITE + path;
                }
            } catch (e) {
                console.error('Error parsing deep link:', e);
            }
            return null;
        }

        // Request push notification permissions before redirecting
        async function setupPushNotifications() {
            const { PushNotifications } = (window.Capacitor && window.Capacitor.Plugins) || {};
            
            if (!PushNotifications) {
                console.log('PushNotifications plugin not available');
                return;
            }

            try {
                // Check current permission status
                const permStatus = await PushNotifications.checkPermissions();
                console.log('Push permission status:', permStatus.receive);

                if (permStatus.receive === 'prompt' || permStatus.receive === 'prompt-with-rationale') {
                    // Request permission - this will show the system dialog
                    document.getElementById('status-text').textContent = 'Setting up notifications...';
                    const result = await PushNotifications.requestPermissions();
                    console.log('Permission request result:', result.receive);

                    if (result.receive === 'granted') {
                        // Register for push notifications
                        await PushNotifications.register();
                        console.log('Registered for push notifications');
                    }
                } else if (permStatus.receive === 'granted') {
                    // Already granted, just register
                    await PushNotifications.register();
                    console.log('Already have permission, registered for push');
                }

                // Listen for registration success to get the token
                PushNotifications.addListener('registration', function(token) {
                    console.log('FCM Token:', token.value);
                    // Store the token - it will be sent to the server when user logs in
                    try {
                        localStorage.setItem('fcm_token', token.value);
                    } catch (e) {
                        console.error('Failed to store FCM token:', e);
                    }
                });

                PushNotifications.addListener('registrationError', function(error) {
                    console.error('Push registration error:', error);
                });

            } catch (e) {
                console.error('Push notification setup error:', e);
            }
        }

        async function run() {
            console.log("Bridge: Starting...");

            await new Promise(r => setTimeout(r, 100));

            const { SplashScreen, App, Browser } = (window.Capacitor && window.Capacitor.Plugins) || {};

            if (SplashScreen) {
                try {
                    await SplashScreen.hide();
                } catch (e) { console.error(e); }
            }

            // Request push notification permissions early
            // This must happen on the bridge page where Capacitor plugins are available
            await setupPushNotifications();

            // Set up deep link listeners
            if (App) {
                App.addListener('appUrlOpen', function (event) {
                    const targetUrl = parseDeepLink(event.url);
                    if (targetUrl) {
                        if (Browser) Browser.close().catch(() => { });
                        window.location.replace(targetUrl);
                    }
                });
            }

            // Detect cold-start deep link
            let path = '';
            if (App) {
                try {
                    const launch = await App.getLaunchUrl();
                    if (launch && launch.url) {
                        const targetUrl = parseDeepLink(launch.url);
                        if (targetUrl) {
                            const url = new URL(targetUrl);
                            path = url.pathname + url.search;
                        }
                    }
                } catch (e) { console.error(e); }
            }

            const targetUrl = path ? LIVE_SITE + path : LIVE_SITE;

            // Connectivity check with retry — the WebView network stack
            // may not be ready on cold start, so retry a few times
            async function canReachServer() {
                try {
                    const resp = await fetch(LIVE_SITE + '/static/manifest.json', {
                        method: 'HEAD',
                        cache: 'no-store',
                        signal: AbortSignal.timeout(5000)
                    });
                    return resp.ok;
                } catch (e) {
                    return false;
                }
            }

            // Retry connectivity up to 3 times with short delays
            let reachable = false;
            for (let attempt = 1; attempt <= 3; attempt++) {
                reachable = await canReachServer();
                if (reachable) break;
                // Wait before next attempt (network stack may still be initializing)
                await new Promise(r => setTimeout(r, 1000));
                document.getElementById('status-text').textContent =
                    attempt < 3 ? 'Still connecting...' : 'Checking connection...';
            }

            if (reachable) {
                // Server reachable — redirect immediately
                redirectStarted = true;
                window.location.replace(targetUrl);
                return;
            }

            // Server not reachable — DO NOT navigate to external URL when offline.
            // The service worker on blog.echowithin.xyz cannot intercept navigation
            // from this local bridge page. If we navigate while offline, the WebView
            // will show "The webpage cannot be displayed" before any SW can help.
            // Instead, show our offline UI immediately and let the user retry.
            console.log('Bridge: Server unreachable, showing offline UI');
            showOfflineUI();
        }

        function showOfflineUI() {
            document.getElementById('loader-container').style.display = 'none';
            const offlineContainer = document.getElementById('offline-container');
            offlineContainer.style.display = 'flex';
        }

        function hideOfflineUI() {
            document.getElementById('offline-container').style.display = 'none';
            document.getElementById('loader-container').style.display = 'flex';
            document.getElementById('status-text').textContent = 'Connecting to server...';
        }

        // Retry button handler
        document.getElementById('retry-btn').addEventListener('click', function() {
            hideOfflineUI();
            run();
        });

        // Auto-retry when connection is restored
        window.addEventListener('online', function() {
            if (!redirectStarted) {
                hideOfflineUI();
                run();
            }
        });

        run();
    </script>
</body>

</html>
